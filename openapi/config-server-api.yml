openapi: 3.0.3
info:
  title: Spring Cloud Config Server API
  description: >-
    REST API provided by Spring Cloud Config Server for retrieving externalized
    configuration for applications across environments and profiles.
  version: 4.1.0
  contact:
    name: Spring Cloud
    url: https://spring.io/projects/spring-cloud-config
servers:
  - url: http://localhost:8888
    description: Default Config Server
paths:
  /{application}/{profile}:
    get:
      operationId: getConfiguration
      summary: Retrieve configuration for application and profile
      description: >-
        Returns the configuration properties for the given application and
        profile, using the default label (usually main/master branch).
      tags:
        - Configuration
      parameters:
        - name: application
          in: path
          required: true
          schema:
            type: string
          description: Application name
        - name: profile
          in: path
          required: true
          schema:
            type: string
          description: Active profile(s), comma-separated
      responses:
        '200':
          description: Configuration environment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
  /{application}/{profile}/{label}:
    get:
      operationId: getConfigurationWithLabel
      summary: Retrieve configuration for application, profile, and label
      description: >-
        Returns the configuration properties for the given application, profile,
        and label (e.g., branch name or tag).
      tags:
        - Configuration
      parameters:
        - name: application
          in: path
          required: true
          schema:
            type: string
          description: Application name
        - name: profile
          in: path
          required: true
          schema:
            type: string
          description: Active profile(s), comma-separated
        - name: label
          in: path
          required: true
          schema:
            type: string
          description: Label (branch, tag, or commit ID)
      responses:
        '200':
          description: Configuration environment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
  /{application}-{profile}.yml:
    get:
      operationId: getConfigurationAsYaml
      summary: Retrieve configuration as YAML
      tags:
        - Configuration
      parameters:
        - name: application
          in: path
          required: true
          schema:
            type: string
        - name: profile
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Configuration as YAML
          content:
            text/yaml:
              schema:
                type: string
  /{application}-{profile}.properties:
    get:
      operationId: getConfigurationAsProperties
      summary: Retrieve configuration as properties
      tags:
        - Configuration
      parameters:
        - name: application
          in: path
          required: true
          schema:
            type: string
        - name: profile
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Configuration as Java properties
          content:
            text/plain:
              schema:
                type: string
  /{application}-{profile}.json:
    get:
      operationId: getConfigurationAsJson
      summary: Retrieve configuration as JSON
      tags:
        - Configuration
      parameters:
        - name: application
          in: path
          required: true
          schema:
            type: string
        - name: profile
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Configuration as JSON
          content:
            application/json:
              schema:
                type: object
  /encrypt:
    post:
      operationId: encryptValue
      summary: Encrypt a configuration value
      tags:
        - Encryption
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: Encrypted value
          content:
            text/plain:
              schema:
                type: string
  /decrypt:
    post:
      operationId: decryptValue
      summary: Decrypt a configuration value
      tags:
        - Encryption
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: Decrypted value
          content:
            text/plain:
              schema:
                type: string
  /actuator/refresh:
    post:
      operationId: refreshConfiguration
      summary: Refresh configuration
      description: Triggers a refresh of the configuration properties.
      tags:
        - Management
      responses:
        '200':
          description: List of changed configuration keys
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /actuator/bus-refresh:
    post:
      operationId: busRefresh
      summary: Broadcast configuration refresh via Spring Cloud Bus
      tags:
        - Management
      responses:
        '200':
          description: Refresh broadcast sent
components:
  schemas:
    Environment:
      type: object
      properties:
        name:
          type: string
          description: Application name
        profiles:
          type: array
          items:
            type: string
          description: Active profiles
        label:
          type: string
          description: Label (branch/tag)
        version:
          type: string
          description: Version identifier (e.g., Git commit hash)
        state:
          type: string
          description: State of the configuration
        propertySources:
          type: array
          items:
            $ref: '#/components/schemas/PropertySource'
          description: List of property sources
    PropertySource:
      type: object
      properties:
        name:
          type: string
          description: Name/URI of the property source
        source:
          type: object
          additionalProperties:
            type: string
          description: Map of property key-value pairs
